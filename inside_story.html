<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>HOLE - INSIDE STORY</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: #fff; }
        #soil { position: fixed; inset: 0; background: #e0d0c0; z-index: 0; }
        #hole {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: clamp(280px, 75vw, 800px); min-height: 100%;
            background: #2b1d0e; box-shadow: inset 0 0 80px rgba(0,0,0,1);
            z-index: 1;
        }
        #content {
            position: relative; width: clamp(280px, 75vw, 800px); margin: 0 auto;
            z-index: 2; color: #ccc; padding: 100px 10%; line-height: 2;
        }
        h2 { color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 100px; }
        .back-link { display: block; margin-top: 100px; color: #888; text-align: center; }
    </style>
</head>
<body>
    <div id="soil"></div>
    <div id="hole"></div>
    <div id="content">
        <h1>裏話</h1>
        <p>ここに制作の意図や裏話を記載してください。</p>
        
        <h2>デザインについて</h2>
        <p>深く潜るにつれて暗くなる演出は……</p>

        <h2>音声について</h2>
        <p>落下音の周波数は……</p>

        <a href="clear.html" class="back-link">クリアページへ戻る</a>
        <div style="height: 200px;"></div> </div>

    <script>
        window.addEventListener('scroll', () => {
            const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
            const p = Math.min(window.pageYOffset / scrollMax, 1);
            document.getElementById('soil').style.background = `rgb(${224-200*p}, ${208-190*p}, ${192-180*p})`;
            document.getElementById('hole').style.background = `rgb(${43-40*p}, ${29-27*p}, ${14-13*p})`;
        });
    </script>
</body>
</html>
