<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLE - CLEAR</title>
    
    <style>
        /* デフォルトの余白を完全に削除 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールバーによる余白も防ぐ */
            background-color: #fff; /* 画像が読み込まれるまでの背景色 */
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover; /* ここで画面全体を強制的に埋める */
            display: flex;
            font-family: sans-serif;
        }

        /* スマホ用：縦長背景画像 */
        @media (max-width: 768px), (orientation: portrait) {
            body { 
                background-image: url('image/clear_result_sp.png');
                justify-content: center; /* スマホは中央下へ */
                align-items: flex-end;
                padding-bottom: 40px;
            }
        }
        
        /* PC用：横長背景画像 */
        @media (min-width: 769px) {
            body { 
                background-image: url('image/clear_result_pc.png');
                justify-content: flex-end; /* PCは右下へ */
                align-items: flex-end;    
                padding-right: 40px;      
                padding-bottom: 40px;     
            }
        }

        .ui-group {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px; border-radius: 20px;
        }
        .btn {
            width: 240px; padding: 14px; border-radius: 9999px; 
            text-align: center; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .btn-share { background: #000; color: #fff; }
        .btn-sub { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
        .reset-link { margin-top: 10px; color: #999; font-size: 10px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="ui-group">
    <a id="x-share" href="#" target="_blank" class="btn btn-share">クリアしたことをシェアする</a>
    <a href="https://forms.gle/ZdtxnvSvTAAHu5xk8" target="_blank" class="btn btn-sub">アンケートはこちらから！</a>
    <a href="inside_story.html" class="btn btn-sub">裏話はこちらから！</a>
</div>

<script>
    const shareText = "持ち帰り謎「HOLE」の全ての謎を解き明かした！\n\n#エフェックス謎解き\n#HOLE謎\n";
    const shareUrl = "https://あなたのドメイン/index.html"; 
    document.getElementById('x-share').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
</script>
</body>
</html>
